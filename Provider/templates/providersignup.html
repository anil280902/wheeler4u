<!doctype html>
<html lang="en">

{% load static %}

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <style>

    .card {
      border: 1px solid;
      padding: 10px;
      border-radius: 30px;
      box-shadow: 5px 10px 15px #888888;
    }

    .card-title {
      font-size: 30px;
      text-align: center;
      font-weight: 700;
    }

    p {
      text-align: center;
    }
    body{
      background-color : #f3ffff;
    }

  </style>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">


</head>

<body>

  <div class="card position-absolute top-50 start-50 translate-middle" style="width: 45rem;">
    <div class="card-body">
      <h5 class="card-title">Create Provider Account</h5>
      <p class="card-text">Enter your information to create an account</p>
      {% for msg in messages %}
        {{msg}}
      {% endfor %}
      <form action="#" method="POST">
        {% csrf_token %}
        <div class="row">
          <div class="col mb-3">
            <div class="row g-1 mb-2 ms-1">
              <label>Provider Name</label>
              <input type="text" class="form-control" name="Provider_name" placeholder="Enter Provider Name" required>
            </div>
            <div class="row g-1 mb-2 ms-1">
              <label>Email</label>
              <input type="email" class="form-control" name="Email" placeholder="Email" required>
            </div>
            <div class="row g-1 mb-2 ms-1">
              <label>Password</label>
              <input type="password" class="form-control" name="Password" minlength="4" placeholder="Password" required>
            </div>
            <div class="row g-1 mb-2 ms-1">
              <label>Phone Number</label>
              <input type="number" class="form-control" name="Phone_no" minlength="10" maxlength="12" placeholder="Phone Number" required>
            </div>
          </div>

          <div class="col mb-3">
            <div class="row g-1 mb-2 me-1">
              <label>Business Name</label>
              <input type="text" class="form-control" name="Business_name" placeholder="Business Name" required>
            </div>
            <div class="row g-1 mb-2 me-1">
              <label>GST Id</label>
              <input type="text" class="form-control" name="GST_id" placeholder="GST Id" required>
            </div>
            <div class="row g-1 mb-2 me-1">
              <label>Business Address</label>
              <textarea class="form-control" rows="4" name="Business_address" placeholder="Business Address" required></textarea>
            </div>
          </div>
        </div>

        <div class="d-grid gap-2">
          <button class="btn btn-dark" type="submit">Sign Up</button>
        </div>

      </form>

    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>

</html>

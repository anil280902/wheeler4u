
{% extends 'header2.html' %}
{% load static %}
{% block content %}
<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>

       <!--start content-->
          <main class="page-content">
            <!--breadcrumb-->
            <div class="page-breadcrumb align-items-center mb-3">
              <div class="breadcrumb-title pe-3">Add Vehicle</div>

            </div>
            <!--end breadcrumb-->

              <div class="row">
                 <div class="col-lg-8 mx-auto">
                  <div class="card">
                    <div class="card-header py-3 bg-transparent">
                       <h5 class="mb-0">Add New Vehicle</h5>
                      </div>
                    <div class="card-body">
                      <div class="border p-3 rounded">
                      <form class="row g-3" method="post" action="/provider/addvehicle_pro/"  data-cities-url="{% url 'ajax_load_cities' %}"  id="personform" >
                        {% csrf_token %}
                        {% for p in pid %}
                        {% if p.Provider_name == user.username %}
<!--                        <div class="col-12">-->
<!--                          <label class="form-label">Provider id</label>-->
                          <input type="hidden" name="Provider_id" class="form-control" value="{{p.id}}">
<!--                        </div>-->
                        {% endif %}
                        {% endfor %}
                        <div class="col-12 col-md-6">
                          <label class="form-label">Category</label>
                          <select class="form-select" name="Brand_name" id="id_country">

                            <option selected disabled>Select Brand</option>
                            {% for d in cid %}
                            <option value="{{d.id}}">{{d.Category_name}}</option>
                            {% endfor %}

                          </select>
                        </div>
                        <div class="col-12 col-md-6">
                          <label class="form-label">Sub-category</label>
                          <select class="form-select" name="Vehicle_model" id="id_city">
                            <option selected disabled>Select Model</option>
                             {% for v in scid %}
                            <option value="{{v.id}}">{{v.Subcategory}}</option>
                            {% endfor %}
                          </select>
                        </div>

                        <div class="col-12">
                          <label class="form-label">Vehicle Number</label>
                          <input type="text" name="Vehicle_number" class="form-control" placeholder="Vehicle Number">
                        </div>

                        <div class="col-12">
                          <label class="form-label">Chassis Number</label>
                          <input type="text" name="Chassis_no" class="form-control" placeholder="Chassis Number">
                        </div>

                        <div class="col-12 col-md-6">
                          <label class="form-label">Fuel Type</label>
                          <select class="form-select" name="Fuel_type">
                            <option selected disabled>Select Fuel Type</option>

                            <option>Petrol</option>
                            <option>Diesel</option>
                            <option>CNG</option>
                            <option>Electronic</option>
                          </select>
                        </div>


                        <div class="col-12 col-md-6">
                          <label class="form-label">Transmission Type</label>
                          <select class="form-select" name="Transmission_type">

                            <option selected disabled>Select Transmission Type</option>

                            <option>Auto</option>
                            <option>Manual</option>
                          </select>
                        </div>


                        <div class="col-12 col-md-6">
                          <label class="form-label">Seating Capicity</label>
                          <select class="form-select" name="Seating_capacity">
                            <option selected disabled>Select Seating Capicity</option>

                            <option>2</option>
                            <option>4</option>
                            <option>6</option>
                            <option>8</option>
                          </select>
                        </div>
                        <div class="col-12">
                          <label class="form-label">Rent Price</label>
                          <input type="text" name="Rent_price" class="form-control" placeholder="Rent Price">
                        </div>

                        <div class="col-12">
                          <label class="form-label">Images</label>
                          <input class="form-control" type="file" name="Vehicle_img1" accept="image/*">
                        </div>
                        <div class="col-12">
                          <label class="form-label">Insurance Images</label>
                          <input class="form-control" type="file" name="Img_insurance" accept="image/*">
                        </div>

                        <br><br><br><br><br>
                        <div class="col-12">
                          <button  type="submit" class="btn btn-primary px-4" style="background-color:#00B2C1;border-color:#00B2C1;color:black">Add Vehicle</button>
                        </div>
                      </form>
                      </div>
                     </div>
                    </div>
                 </div>
              </div><!--end row-->

          </main>

                                                  <script>
                                                    $("#id_country").change(function () {
                                                      var url = $("#personform").attr("data-cities-url");
                                                      var countryId = $(this).val();

                                                      $.ajax({
                                                        url: url,
                                                        data: {
                                                          'Category_id': countryId
                                                        },
                                                        success: function (data) {
                                                          $("#id_city").html(data);
                                                        }
                                                      });

                                                    });
                                </script>

       <!--end page main-->
{% endblock %}

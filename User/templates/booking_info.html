
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <style>
    .card {
      border: 1px solid;
      padding: 10px;
      border-radius: 30px;
      box-shadow: 5px 10px 15px #888888;
    }

    .card-title {
      font-size: 30px;
      text-align: center;
      font-weight: 700;
    }

    p {
      text-align: center;
    }
    .row{
        font-weight: 600;
    }

    body {
      background-color: #7e90a9;
    }


  </style>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
</head>

<body>
<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
  <div class="card " style="width: 45rem;">
    <div class="card-body">
      <h5 class="card-title">Booking Details</h5>
      <p class="card-text">Please fill your information for Booking</p>
<!--      /user/payment/{{vid.id}}-->
      <form action="#" method="post">
        {% csrf_token %}
        {% for p in ui %}
        {% if p.User_name == user.username %}
        <input type="hidden" name="User_id" class="form-control" value="{{p.id}}">
        {% endif %}
        {% endfor %}
        <div class="row">
          <div class="col mb-4">
            <div class="row g-2 mb-3 ms-1 mt-2">
              <label>Starting Date</label>
              <input type="datetime-local" name="B_start_date" class="form-control">
            </div>
            <div class="row g-2 mb-3 ms-1">
              <label>Pickup Location</label>
                <textarea class="form-control" name="Starting_location" rows="3" placeholder="Pickup Location"></textarea>
            </div>
          </div>

          <div class="col mb-4">
            <div class="row g-2 mb-3 me-1 mt-2">
              <label>Ending Date</label>
              <input type="datetime-local" name="B_end_date" class="form-control">
            </div>
            <div class="row g-2 mb-3 me-1">
              <label>Drop location</label>
              <textarea class="form-control" name="Ending_location" rows="3" placeholder="Drop location"></textarea>
            </div>
          </div>
        </div>


          <div class="d-grid gap-2">
          <button class="btn btn-dark" data-buttontext="My Button" type="submit"> Book You Vehicle </button>
        </div>

<!--<script src="https://checkout.razorpay.com/v1/checkout.js" data-key="rzp_test_bilBagOBVTi4lE"-->
<!--          data-amount={{v_price}}-->
<!--           data-name="{{request.user}}" data-theme.color="#F37254" data-description=""-->
<!--          data-image="" data-prefill.name={{request.user.username}} data-prefill.email={{request.user.email}}>-->

<!--     </script>-->

      </form>

    </div>
  </div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

</body>

</html>

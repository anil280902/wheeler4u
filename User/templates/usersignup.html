<!doctype html>
<html lang="en">

{% load static %}

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Sigup</title>
    <style>
        .card {
            border: 1px solid;
            padding: 10px;
            border-radius: 30px;
            box-shadow: 5px 10px 15px #888888;
        }

        .card-title {
            font-size: 30px;
            text-align: center;
            font-weight: 700;
        }

        p {
            text-align: center;
        }

        body {
            background-color: #ecf5ff;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

    <div class="card position-absolute top-50 start-50 translate-middle" style="width: 45rem;">
        <div class="card-body">
            <h5 class="card-title">Create An Account</h5>
            <p class="card-text">Enter your information to Create an account</p>
            <h6  style="color:red">
                        {% for msg in messages %}
                            {{msg}}
                        {% endfor %}
                    </h6>
            <form action="" method="post">
                {% csrf_token %}
                <div class="row">
                    <div class="col mb-3">
                        <div class="row g-1 mb-2 ms-1">
                            <label>User Name</label>
                            <input type="text" class="form-control" name="User_name" placeholder="Enter User Name" required>
                        </div>
                        <div class="row g-1 mb-2 ms-1">
                            <label>Email</label>
                            <input type="email" class="form-control" name="Email" placeholder="Email" required>
                        </div>
                        <div class="row g-1 mb-2 ms-1">
                            <label>Password</label>
                            <input type="password" class="form-control" name="Password" minlength="4" placeholder="Password" required>
                        </div>
                        <div class="row g-1 mb-2 ms-1">
                            <label>Gender</label>
                            <div class="row mt-2 ms-1">
                                <div class="form-check col">
                                    <input class="form-check-input"  type="radio" name="Gender"
                                        id="flexRadioDefault1" value="Male">
                                    <label class="form-check-label" for="flexRadioDefault1">
                                        Male
                                    </label>
                                </div>
                                <div class="form-check col">
                                    <input class="form-check-input" type="radio" name="Gender"
                                        id="flexRadioDefault2" value="Female">
                                    <label class="form-check-label" for="flexRadioDefault2">
                                        Female
                                    </label>
                                </div>
                                <div class="form-check col">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col mb-3">
                        <div class="row g-1 mb-2 me-1">
                            <label>Phone Number</label>
                            <input type="number" class="form-control" minlength="10" maxlength="12" name="Phone_no" placeholder="Phone Number" required>
                        </div>
                        <div class="row g-1 mb-2 me-1">
                            <label>Licence No</label>
                            <input type="text" class="form-control" name="Licence_no" placeholder="Licence No" required>
                        </div>
                        <div class="row g-1 mb-2 me-1">
                            <label>Address</label>
                            <textarea class="form-control" rows="4" name="Address" placeholder="Address" required></textarea>
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-dark" type="submit">Sign Up</button>
                </div>

            </form>


        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>



</body>

</html>

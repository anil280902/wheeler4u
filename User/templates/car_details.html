<!doctype html>

{% extends 'indexuser.html' %}
{% load static %}
{% block contant %}

<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Details</title>
    <style>
        .dtable{
           font-family: sans-serif;
        }

    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div class="card m-5">
        <div class="card-body row m-2" style="width:100%;">
            <div class="col" style="width:50%;">
                <div class="card" style="width:100%; height: 100%">
                    <img src="{{cid.Vehicle_img1.url}}" class="img-thumbnail " alt="...">
                </div>
            </div>
            <div class="col" style="width:50%;">
                <div class="card" style="width:97%; height: 100%">
                    <div class="card-body position-absolute top-50 start-50 translate-middle">

                        <!-- <h6 class="card-subtitle mb-2 text-body-secondary"></h6> -->
                        <table class="dtable">
                            <tr>
                       <td> <h1 class="card-title">{{cid.Brand_name}}</h1></td>
                        </tr>
                        <th class="car-title" style="font-size: 20px;">{{cid.Vehicle_model}}</th>
                        <tr>
                            <td>Rent</td>
                            <td>{{cid.Rent_price}}</td>
                        </tr>
                        <tr>
                            <td>Seating capacity </td>
                            <td>{{cid.Seating_capacity}}</td>
                        </tr>
                        <tr>
                            <td>Fual type </td>
                            <td>{{cid.Fuel_type}}</td>
                        </tr>
                        <tr>
                            <td>Transmmision Type </td>
                            <td>{{cid.Transmission_type}}</td>
                        </tr>
                        <tr>
                            <td><a href="/user/booking_info/{{cid.id}}" class="btn btn-primary py-2 mr-1 m-2">Book now</a></td>
                        </tr>



                    </table>



                        <!-- <a href="#" class="card-link">Card link</a>
                        <a href="#" class="card-link">Another link</a> -->

                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
{% endblock %}

  <title>User</title>
</head>

<style>
    .btn-war2 {
    color: #000;
    background-color: #00B2C1;
    border-color: #00B2C1;
}
.bg-login {
    background-color: #ffffff !important;
}
img, svg {
    margin-left: 40px;
    vertical-align: middle;
}
a{
    color: #e6e6e6;
}
a:hover{
    color: #ffffff;
}

.card-title{
    margin-top: 13px;
    margin-bottom: 0px;
}

body {
    background-color: #e2f0ff;
    }

</style>
<body>

  <!--start wrapper-->
  <div class="wrapper">

       <!--start content-->
       <main class="authentication-content">
        <div class="container-fluid">
          <div class="authentication-card">
            <div class="card shadow rounded-0 overflow-hidden">
              <div class="row g-0">
                <div class="col-lg-6 bg-login d-flex align-items-center justify-content-center">
                  <img src="{% static 'assets/images/error/carlogo.webp' %}" height="400px" width="650px">
                </div>
                <div class="col-lg-6">
                  <div class="card-body p-sm-5">
                      <button class="btn btn-primary mb-2 me-2 radius-15" type="button"><a href="/adminsignin/">Admin</a></button>
                      <button class="btn btn-primary mb-2 ms-2 radius-15" type="button"><a href="/provider/">Provider</a></button>
                    <h5 class="card-title">User Sign In</h5><br>
                    <h6  style="color:red">
                        {% for msg in messages %}
                            {{msg}}
                        {% endfor %}
                    </h6>
                    <form class="form-body" method="POST">
                        {% csrf_token %}
                      <div class="d-grid">
                        <div class="row g-3">
                          <div class="col-12">
                            <label class="form-label">Username</label>
                            <div class="ms-auto position-relative">
                              <div class="position-absolute top-50 translate-middle-y search-icon px-3"><i class="fa-solid fa-user"></i></div>
                              <input type="text" id="username" name="username" class="form-control radius-30 ps-5" placeholder="Enter Username" required>
                            </div>
                          </div>
                          <div class="col-12">
                            <label class="form-label">Enter Password</label>
                            <div class="ms-auto position-relative">
                              <div class="position-absolute top-50 translate-middle-y search-icon px-3"><i class="bi bi-lock-fill"></i></div>
                              <input type="password" id="password" name="Password" class="form-control radius-30 ps-5" minlength="4" placeholder="Enter Password" required>
                            </div>
                          </div>
                            <div class="col-4 text-end">	<a href="/user/usersignup/">Ragistration</a>
                          </div>
                            <div style="margin-top: 1px;">
                          <div class="col-5 text-end">	<a href=""></a>
                          </div>
                                </div>
                          <div class="col-12">
                            <div class="d-grid">
                              <button type="submit" id="signin-btn" class="btn btn-war2 radius-30" style="border: 2px solid #515151cc" >Sign In</button>
                            </div>
                          </div>
                          <div class="col-12">
<!--                            <p class="mb-0">Don't have an account yet? <a href=" ">Sign up here</a></p>-->
                          </div>
                        </div>
                      </div>
                    </form>
                 </div>
                </div>
              </div>
            </div>
          </div>
        </div>
       </main>

       <!--end page main-->

  </div>
  <!--end wrapper-->


  <!--plugins-->
  <script src="{% static 'assets/js/jquery.min.js' %}"></script>
  <script src="{% static 'assets/js/pace.min.js' %}"></script>





</body>

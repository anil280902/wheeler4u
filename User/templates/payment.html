<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payment</title>
    <style>
        .card {
            border: 1px solid;
            padding: 10px;
            border-radius: 30px;
            box-shadow: 5px 10px 15px #888888;
        }

        .card-title {
            font-size: 30px;
            text-align: center;
            font-weight: 700;
        }

        p {
            text-align: center;
        }

        body {
            background-color: #ecf5ff;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

    <div class="card position-absolute top-50 start-50 translate-middle" style="width: 25rem;">
        <div class="card-body">
            <h5 class="card-title fs-2">Total Payable Amount</h5>
            <div class="row">
                {% if o_deposit >= 2000 %}
                <div class="row g-2 mb-4 ms-1 mt-2 fs-5">
                  <p class="">You Already Have 2000 Deposit</p>
                </div>
                {% endif %}
            <div class="col mb-3">
                {% if o_deposit < 2000 %}
                <div class="row g-2 mb-2 ms-1 mt-3">
                  <p class="fs-4">Deposit : </p>

                </div>
                {% endif %}
                <div class="row g-2 mb-2 ms-1">
                    <p class="fs-4">Rent : </p>

                </div>
                <div class="row g-2 mb-2 ms-1">
                    <p class="fs-4">Day : </p>

                </div>
                <div class="row g-2 mb-3 ms-1">
                    <hr>
                    <p class="fs-4">Total : </p>

                </div>
            </div>
            <div class="col mb-3">
                {% if o_deposit < 2000 %}
                <div class="row g-2 mb-2 ms-1 mt-3">
                  <p class="fs-4">{{n_deposit}}</p>

                </div>
                {% endif %}
                <div class="row g-2 mb-2 ms-1">
                    <p class="fs-4">{{rent}}</p>

                </div>
                <div class="row g-2 mb-2 ms-1">
                    <p class="fs-4">{{D}}</p>

                </div>
                <div class="row g-2 mb-3 ms-1">
                    <hr>
                    <p class="fs-4">{{total}}</p>

                </div>
            </div>
            </div>

            <form action="/user/indexuser/" method="post">
                    {% csrf_token %}
            <div class="d-grid gap-2">
                <button class="btn btn-success" data-buttontext="My Button" type="submit">Payment</button>
            </div>

                <script src="https://checkout.razorpay.com/v1/checkout.js" data-key="rzp_test_bilBagOBVTi4lE"
          data-amount={{r_total}}
           data-name="{{request.user}}" data-theme.color="#F37254" data-description=""
          data-image="" data-prefill.name={{request.user.username}} data-prefill.email={{request.user.email}}>

     </script>
                </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>



</body>

</html>

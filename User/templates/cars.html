{% extends 'indexuser.html' %}
{% load static %}
{% block contant %}
<!--<!DOCTYPE html>-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'cs/style.css' %}">
    <title>Cars</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
    img{
            aspect-ratio: 3/2;
            object-fit: contain;
        }
        #a1{
            margin-top: 10px;
            padding: 4px;
        }
        #a1 span{
            color: black;
        }
    </style>
</head>

  <div class="album py-1 bg-body-tertiary">
    <div class="container ">

      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3 " data-bs-theme="">
          {% for v in vid %}
        <div class="col">
          <div class="card shadow-sm p-2">
            <img src="{{v.Vehicle_img1.url}}" class="card-img-top" alt="...">
              <div class="text11 pb-3">
                <h2 class="mb-0"><a href="car-single.html">{{v.Brand_name}}</a></h2>
                <div class="d-flex mb-2" id="a1">
                    <span class="cat">{{v.Vehicle_model}}</span>
                    <p class="price ml-auto">{{v.Rent_price}} <span>/day</span></p>
                </div>
                <p class="d-flex mb-0 d-block p-0"><a href="#" class="btn btn-primary py-2 mr-1">Book now</a>
                    <a href="/user/car_details/{{v.id}}" class="btn btn-secondary py-2 ml-1">Details</a></p>
            </div>
          </div>
        </div>
          {% endfor %}


      </div>
    </div>
  </div>

{% endblock %}

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

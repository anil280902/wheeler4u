{% extends 'header1.html' %}
{% load static %}
{% block content %}
    <!--start content-->
    <main class="page-content">
        <!--breadcrumb-->
        <div class="page-breadcrumb align-items-center mb-3">
            <div class="breadcrumb-title pe-3">Sub-Category</div>
        </div>
        <!--end breadcrumb-->

        <div class="card">
            <div class="card-header py-3">
                <h6 class="mb-0">Add Vehicle Model</h6>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-12 col-lg-4 d-flex">
                        <div class="card border shadow-none w-100">
                            <div class="card-body">
                                <form class="row g-3" method="POST" action="/subcategory/">
                                    {% csrf_token %}
                                    <div class="col-12">
                                        <label class="form-label">Category</label>
                                        <select class="form-select" name="Category">
                                            <option selected disabled>Select Brand</option>
                                            {% for category in categories %}
                                                <option value="{{ category.id }}">{{ category.Category_name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label">Subcategory</label>
                                        <input type="text" name="Subcategory" class="form-control" placeholder="Vehicle Model Name">
                                    </div>
                                    <div class="col-12">
                                        <div class="d-grid">
                                            <button type="submit" class="btn btn-primary" style="background-color:#d43f1e;border-color:#d43f1e">Add Model</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!--end page main-->
{% endblock %}
